<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phần Mềm Tính Số Lượng Phim</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel for running JSX in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // Custom Icon Component to work with Lucide in browser
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [data, setData] = useState({
                mri: { label: 'MRI', quantity: 68, coefficient: 4 },
                clvt_co_can_quang: { label: 'CLVT (Có cản quang)', quantity: 0, coefficient: 4 },
                clvt_khong_tiem: { label: 'CLVT (Không tiêm thuốc cản quang)', quantity: 0, coefficient: 2 },
                clvt_detail_co_can_quang: { label: 'Cắt lớp vi tính (Có cản quang)', quantity: 1, coefficient: 4 },
                clvt_detail_khong_tiem: { label: 'Cắt lớp vi tính (Không tiêm thuốc cản quang)', quantity: 321, coefficient: 2 },
            });

            const handleFocus = (key) => {
                setData(prev => ({
                    ...prev,
                    [key]: { ...prev[key], quantity: '' }
                }));
            };

            const handleQuantityChange = (key, value) => {
                const val = value === '' ? '' : (parseInt(value) || 0);
                setData(prev => ({
                    ...prev,
                    [key]: { ...prev[key], quantity: val }
                }));
            };

            const handleBlur = (key, value) => {
                if (value === '') {
                    setData(prev => ({
                        ...prev,
                        [key]: { ...prev[key], quantity: 0 }
                    }));
                }
            };

            const results = useMemo(() => {
                let total = 0;
                const items = Object.entries(data).map(([key, item]) => {
                    const qty = Number(item.quantity) || 0;
                    const filmCount = qty * item.coefficient;
                    total += filmCount;
                    return { key, ...item, filmCount };
                });
                return { items, total };
            }, [data]);

            const resetForm = () => {
                const resetData = {};
                Object.keys(data).forEach(key => {
                    resetData[key] = { ...data[key], quantity: 0 };
                });
                setData(resetData);
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                <div className="bg-blue-600 p-3 rounded-xl shadow-lg shadow-blue-200">
                                    <Icon name="calculator" className="text-white" />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-slate-800">Tính Số Lượng Phim</h1>
                                    <p className="text-slate-500 text-sm">Phiên bản sử dụng Offline trên máy tính</p>
                                </div>
                            </div>
                            <button onClick={resetForm} className="flex items-center justify-center gap-2 bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-2 rounded-lg transition-colors text-sm font-medium">
                                <Icon name="refresh-ccw" size={16} />
                                Làm mới số lượng
                            </button>
                        </div>

                        <div className="hidden md:block overflow-hidden bg-white rounded-2xl shadow-sm border border-slate-200">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200">
                                        <th className="px-6 py-4 text-sm font-semibold text-slate-600 uppercase w-1/3 text-center border-r">Nội Dung</th>
                                        <th className="px-6 py-4 text-sm font-semibold text-slate-600 uppercase text-center border-r">Số Lượng</th>
                                        <th className="px-6 py-4 text-sm font-semibold text-slate-600 uppercase text-center border-r">Hệ Số</th>
                                        <th className="px-6 py-4 text-sm font-semibold text-blue-700 uppercase text-center bg-blue-50">Số Lượng Phim</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {results.items.map((item) => (
                                        <tr key={item.key} className="hover:bg-slate-50">
                                            <td className="px-6 py-4 font-medium text-slate-700 border-r">{item.label}</td>
                                            <td className="px-6 py-4 border-r">
                                                <input
                                                    type="number"
                                                    value={item.quantity}
                                                    onFocus={() => handleFocus(item.key)}
                                                    onBlur={(e) => handleBlur(item.key, e.target.value)}
                                                    onChange={(e) => handleQuantityChange(item.key, e.target.value)}
                                                    className="w-full px-4 py-2 text-center rounded-lg border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none font-semibold"
                                                />
                                            </td>
                                            <td className="px-6 py-4 border-r bg-slate-50/50 text-center">
                                                <div className="flex items-center justify-center gap-2 text-slate-500 font-bold text-lg">
                                                    <Icon name="lock" size={12} className="opacity-40" />
                                                    {item.coefficient}
                                                </div>
                                            </td>
                                            <td className="px-6 py-4 text-center bg-blue-50 font-bold text-blue-700 text-lg">
                                                {item.filmCount.toLocaleString()}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                                <tfoot>
                                    <tr className="bg-blue-600 text-white font-bold">
                                        <td colSpan="3" className="px-6 py-6 text-right text-xl uppercase">Tổng số lượng phim</td>
                                        <td className="px-6 py-6 text-center text-3xl">{results.total.toLocaleString()}</td>
                                    </tr>
                                </tfoot>
                            </table>
                        </div>

                        {/* Mobile view remains functional for small windows */}
                        <div className="md:hidden space-y-4">
                            {results.items.map((item) => (
                                <div key={item.key} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                                    <div className="text-slate-800 font-bold mb-4 flex items-center gap-2">
                                        <Icon name="file-text" size={18} className="text-blue-500" />
                                        {item.label}
                                    </div>
                                    <div className="grid grid-cols-2 gap-4 mb-4">
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold mb-1 block uppercase">Số lượng</label>
                                            <input
                                                type="number"
                                                value={item.quantity}
                                                onFocus={() => handleFocus(item.key)}
                                                onBlur={(e) => handleBlur(item.key, e.target.value)}
                                                onChange={(e) => handleQuantityChange(item.key, e.target.value)}
                                                className="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-lg"
                                            />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-500 font-bold mb-1 block uppercase">Hệ số (Khóa)</label>
                                            <div className="w-full px-4 py-3 rounded-xl bg-slate-100 border border-slate-200 text-slate-500 font-bold text-lg flex justify-between items-center">
                                                {item.coefficient}
                                                <Icon name="lock" size={14} className="opacity-40" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-blue-50 rounded-xl p-3 flex justify-between items-center border border-blue-100 font-bold text-blue-700">
                                        <span>Thành tiền phim:</span>
                                        <span className="text-xl">{item.filmCount.toLocaleString()}</span>
                                    </div>
                                </div>
                            ))}
                            <div className="bg-blue-600 rounded-2xl p-6 text-white shadow-lg sticky bottom-4 flex justify-between items-center">
                                <span className="text-lg font-bold uppercase tracking-wider">Tổng cộng</span>
                                <span className="text-4xl font-black">{results.total.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
